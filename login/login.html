<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoursePilot - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /*=============== GOOGLE FONTS ===============*/
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap");

        /*=============== VARIABLES CSS ===============*/
        :root {
          --hue-color: 220; /* Dark blue tone */
          --black-color: hsl(var(--hue-color), 50%, 15%);
          --black-color-alt: hsl(var(--hue-color), 50%, 20%);
          --title-color: hsl(var(--hue-color), 50%, 90%);
          --text-color: hsl(var(--hue-color), 50%, 70%);
          --text-color-light: hsl(var(--hue-color), 50%, 60%);
          --white-color: #FFF;
          --body-color: hsl(var(--hue-color), 50%, 10%);
          --container-color: hsl(var(--hue-color), 50%, 12%);
          --form-container-color: hsl(var(--hue-color), 50%, 18%);
          --text-gradient: linear-gradient(hsl(var(--hue-color), 50%, 30%), hsl(var(--hue-color), 50%, 15%));
          --accent-color: hsl(var(--hue-color), 70%, 45%);
          --accent-hover: hsl(var(--hue-color), 70%, 55%);

          /*========== Font and typography ==========*/
          --body-font: 'Poppins', sans-serif;
          --h2-font-size: 1.8rem;
          --h3-font-size: 1.25rem;
          --normal-font-size: 1.05rem;
          --small-font-size: .9rem;
          
          /*========== Font weight ==========*/
          --font-medium: 500;
          --font-semi-bold: 600;
        }

        /*=============== BASE ===============*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
          font-family: var(--body-font);
          background: linear-gradient(135deg, var(--body-color), var(--black-color));
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          color: var(--text-color);
          padding: 1rem;
          position: relative;
          overflow: hidden;
        }

        /* Floating background elements */
        .floating-element {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            z-index: -1;
        }

        .floating-1 {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 5%;
            animation: float 20s infinite ease-in-out;
        }

        .floating-2 {
            width: 150px;
            height: 150px;
            bottom: 15%;
            right: 8%;
            animation: float 18s infinite ease-in-out reverse;
        }

        .floating-3 {
            width: 100px;
            height: 100px;
            top: 60%;
            left: 10%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(10px) rotate(240deg); }
        }

        /*=============== LOGIN CONTAINER ===============*/
        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--form-container-color);
            border-radius: 1.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-header {
            padding: 2.5rem 2rem 1.5rem;
            text-align: center;
            background: var(--black-color);
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--accent-color);
        }

        .logo-text {
            font-size: var(--h2-font-size);
            font-weight: var(--font-semi-bold);
            background: var(--text-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-header p {
            font-size: var(--small-font-size);
            color: var(--text-color-light);
        }

        /*=============== FORM STYLES ===============*/
        .login-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: var(--small-font-size);
            color: var(--title-color);
            font-weight: var(--font-medium);
        }

        .input-container {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-color-light);
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 1px solid var(--black-color-alt);
            border-radius: 0.75rem;
            background: var(--black-color);
            color: var(--text-color);
            font-size: var(--normal-font-size);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: var(--small-font-size);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input {
            accent-color: var(--accent-color);
        }

        .forgot-password {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /*=============== BUTTON STYLES ===============*/
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-size: var(--normal-font-size);
            font-weight: var(--font-semi-bold);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--accent-color);
            color: var(--white-color);
            margin-bottom: 1.5rem;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--black-color-alt);
        }

        .btn-secondary:hover {
            background: var(--black-color-alt);
            color: var(--white-color);
        }

        .form-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: var(--small-font-size);
        }

        .switch-link {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: var(--font-medium);
            transition: color 0.3s ease;
        }

        .switch-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /*=============== ANIMATIONS ===============*/
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        /*=============== RESPONSIVE DESIGN ===============*/
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }
            
            .login-header, .login-form {
                padding: 1.5rem;
            }
            
            .floating-1, .floating-2, .floating-3 {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Background Elements -->
    <div class="floating-element floating-1"></div>
    <div class="floating-element floating-2"></div>
    <div class="floating-element floating-3"></div>

    <!-- Login Container -->
    <div class="login-container fade-in">
        <!-- Login Header -->
        <div class="login-header">
            <div class="logo-container">
                <i class="fas fa-graduation-cap logo-icon"></i>
                <h1 class="logo-text">CoursePilot</h1>
            </div>
            <p>Your Learning Journey Starts Here</p>
        </div>

        <!-- Login Form -->
        <div class="login-form">
            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">E-mail</label>
                    <div class="input-container">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-container">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    LOG IN
                </button>
            </form>

            <!-- Signup Form (Hidden Initially) -->
            <form id="signupForm" style="display: none;">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <div class="input-container">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="signupName" class="form-input" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupEmail">E-mail</label>
                    <div class="input-container">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="signupEmail" class="form-input" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-container">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="signupPassword" class="form-input" placeholder="Create a strong password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i>
                        SIGN UP
                </button>
            </form>

            <!-- Form Switch -->
            <div class="form-switch">
                <span id="switchText">New User? </span>
                <span id="switchLink" class="switch-link">Sign up now</span>
            </div>
        </div>
    </div>

    <script>
        // Check if user is already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = '../Home/home.html';
        }

        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");
        const switchLink = document.getElementById("switchLink");
        const switchText = document.getElementById("switchText");

        let isLoginForm = true;

        // Switch between login and signup forms
        switchLink.addEventListener("click", () => {
            if (isLoginForm) {
                // Switch to signup form
                loginForm.style.display = "none";
                signupForm.style.display = "block";
                switchText.textContent = "Already have an account? ";
                switchLink.textContent = "Log in";
            } else {
                // Switch to login form
                signupForm.style.display = "none";
                loginForm.style.display = "block";
                switchText.textContent = "New User? ";
                switchLink.textContent = "Sign up now";
            }
            isLoginForm = !isLoginForm;
        });

        // Login form submission
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                const response = await fetch("http://localhost:5001/login", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mail: email, password: password })
                });
                
                const data = await response.json();
                
                if (data.pass === password) {
                    // Store login status in localStorage
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    alert("Logged in successfully");
                    window.location.href = '../Home/home.html';
                } else {
                    alert(data.msg);
                }
            } catch (error) {
                console.error('Login error:', error);
                // For demo purposes, allow login even if backend is not available
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                alert("Demo: Logged in successfully (backend not available)");
                window.location.href = '../Home/home.html';
            }
        });

        // Signup form submission
        signupForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("signupName").value;
            const email = document.getElementById("signupEmail").value;
            const password = document.getElementById("signupPassword").value;

            try {
                const response = await fetch("http://localhost:5001/signup", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, mail: email, password: password })
                });
                
                const data = await response.json();
                alert(data.msg);
                
                // After successful signup, switch to login form
                signupForm.style.display = "none";
                loginForm.style.display = "block";
                switchText.textContent = "New User? ";
                switchLink.textContent = "Sign up now";
                isLoginForm = true;
            } catch (error) {
                console.error('Signup error:', error);
                alert("Demo: Account created successfully (backend not available)");
                signupForm.style.display = "none";
                loginForm.style.display = "block";
                switchText.textContent = "New User? ";
                switchLink.textContent = "Sign up now";
                isLoginForm = true;
            }
        });

        // Remember me functionality
        document.getElementById('rememberMe').addEventListener('change', function() {
            if (this.checked) {
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('rememberMe');
            }
        });

        // Check if remember me was previously set
        if (localStorage.getItem('rememberMe') === 'true') {
            document.getElementById('rememberMe').checked = true;
        }
    </script>
</body>
</html>
