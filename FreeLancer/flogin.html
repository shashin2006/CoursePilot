<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Pilot - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../login/login.css">
  
   
<body>
  <!-- Floating Background Elements -->
  <div class="floating-element floating-1"></div>
  <div class="floating-element floating-2"></div>
  <div class="floating-element floating-3"></div>

  <!-- Navbar -->
  <div class="nav fade-in">
    <div>
      <h2><i class="fas fa-graduation-cap"></i> Course Pilot</h2>
    </div>
    <a href="free.html" style="text-decoration: none;">
      <div class="nav1">
        <i class="fas fa-user-plus"></i> Register as a Freelancer
      </div>
    </a>
  </div>

  <!-- Login and Sign-Up Forms -->
  <div class="logNsgup">
    <div class="form-container" id="formContainer">
      <!-- Login Form -->
      <form action="" class="form p1" id="p1">
        <h2><i class="fas fa-sign-in-alt"></i> Student Login</h2>
        
        <div class="form-group">
          <label for="lmail"><i class="fas fa-envelope"></i> E-mail</label>
          <div class="input-container">
            <i class="fas fa-envelope input-icon"></i>
            <input class="input" type="email" name="mail" id="lmail" placeholder="Enter your email" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="lpass"><i class="fas fa-lock"></i> Password</label>
          <div class="input-container">
            <i class="fas fa-lock input-icon"></i>
            <input class="input" type="password" name="password" id="lpass" placeholder="Enter your password" required>
          </div>
        </div>
        
        <button class="button" id="login">
          <span class="button-text">LOG IN</span>
          <div class="spinner" id="loginSpinner"></div>
        </button>
        
        <div class="form-switch">
          New User? 
          <span class="switch-link" id="signup">Sign up now</span>
        </div>
      </form>

      <!-- Sign-Up Form -->
      <form action="" class="form p2" id="p2">
        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
        
        <div class="form-group">
          <label for="uname"><i class="fas fa-user"></i> Full Name</label>
          <div class="input-container">
            <i class="fas fa-user input-icon"></i>
            <input class="input" type="text" name="uname" id="uname" placeholder="Enter your full name" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="umail"><i class="fas fa-envelope"></i> E-mail</label>
          <div class="input-container">
            <i class="fas fa-envelope input-icon"></i>
            <input class="input" type="email" name="mail" id="umail" placeholder="Enter your email" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="upass"><i class="fas fa-lock"></i> Password</label>
          <div class="input-container">
            <i class="fas fa-lock input-icon"></i>
            <input class="input" type="password" name="password" id="upass" placeholder="Create a strong password" required>
          </div>
        </div>
        
        <button class="button" id="sign">
          <span class="button-text">SIGN UP</span>
          <div class="spinner" id="signupSpinner"></div>
        </button>
        
        <div class="form-switch">
          Already have an account? 
          <span class="switch-link" id="ulogin">Log in</span>
        </div>
      </form>
    </div>
  </div>

  <!-- JavaScript for Interactivity -->
  <script>
    const formContainer = document.getElementById("formContainer");
    const p1 = document.getElementById("p1");
    const p2 = document.getElementById("p2");
    const signup = document.getElementById("signup");
    const ulogin = document.getElementById("ulogin");
    const login = document.getElementById("login");
    const sign = document.getElementById("sign");
    const loginSpinner = document.getElementById("loginSpinner");
    const signupSpinner = document.getElementById("signupSpinner");

    // Switch to Sign-Up Form
    signup.addEventListener("click", () => {
      formContainer.style.transform = "rotateY(180deg)";
    });

    // Switch to Login Form
    ulogin.addEventListener("click", () => {
      formContainer.style.transform = "rotateY(0deg)";
    });

    // Login Button Event Listener
    login.addEventListener("click", async (e) => {
      e.preventDefault();
      const mail = document.getElementById("lmail").value;
      const pass = document.getElementById("lpass").value;
      
      // Show loading spinner
      loginSpinner.style.display = "block";
      document.querySelector("#login .button-text").style.opacity = "0.5";
      
      // Simulate API call (replace with your actual fetch)
      setTimeout(() => {
        // Hide loading spinner
        loginSpinner.style.display = "none";
        document.querySelector("#login .button-text").style.opacity = "1";
        
        // Your existing login logic
        fetch("http://localhost:5001/flogin", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ mail: mail, password: pass }),
        })
          .then((res) => res.json())
          .then((rep) => {
            if (rep.pass === pass) {
              const lNs = document.getElementById("logNsgup");
              const home = document.getElementById("home");
              lNs.style.display = "none";
              home.style.display = "block";
              window.location.href = "free.html";
              alert("Logged in successfully");
            } else {
              alert(rep.msg);
            }
          });
      }, 1500);
    });

    // Sign-Up Button Event Listener
    sign.addEventListener("click", async (e) => {
      e.preventDefault();
      const uname = document.getElementById("uname").value;
      const umail = document.getElementById("umail").value;
      const upass = document.getElementById("upass").value;
      
      // Show loading spinner
      signupSpinner.style.display = "block";
      document.querySelector("#sign .button-text").style.opacity = "0.5";
      
      // Simulate API call (replace with your actual fetch)
      setTimeout(() => {
        // Hide loading spinner
        signupSpinner.style.display = "none";
        document.querySelector("#sign .button-text").style.opacity = "1";
        
        // Your existing signup logic
        fetch("http://localhost:5001/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ name: uname, mail: umail, password: upass }),
        })
          .then((res) => res.json())
          .then((res) => {
            alert(res.msg);
          });
      }, 1500);
    });

    // Add animation to form elements on page load
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('.input');
      inputs.forEach(input => {
        input.addEventListener('focus', function() {
          this.parentElement.parentElement.classList.add('focused');
        });
        
        input.addEventListener('blur', function() {
          if (this.value === "") {
            this.parentElement.parentElement.classList.remove('focused');
          }
        });
      });
    });
  </script>
</body>
</html>
